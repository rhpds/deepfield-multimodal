---
# AgnosticV catalog config for DeepField Multimodal
# Generated by LiftOff /onboard, corrected for actual model usage

config: namespace
cloud_provider: none
tag: main

requirements_content:
  collections:
    - name: https://github.com/agnosticd/namespaced_workloads.git
      type: git
      version: "{{ tag }}"
    - name: https://github.com/rhpds/rhpds.litellm_virtual_keys.git
      type: git
      version: "{{ tag }}"
    - name: https://github.com/agnosticd/ai_quickstarts.git
      type: git
      version: "{{ tag }}"
    - name: https://github.com/agnosticd/showroom.git
      type: git
      version: v1.6.8

workloads:
  - agnosticd.namespaced_workloads.ocp4_workload_tenant_keycloak_user
  - agnosticd.namespaced_workloads.ocp4_workload_tenant_namespace
  - rhpds.litellm_virtual_keys.ocp4_workload_litellm_virtual_keys
  - agnosticd.ai_quickstarts.quickstart_deploy_via_make
  - agnosticd.showroom.ocp4_workload_showroom

# --- User provisioning ---
common_password: "{{ lookup('password', output_dir ~ '/common_password', length=12, chars=['ascii_letters', 'digits']) }}"
ocp4_workload_tenant_keycloak_username: "user-{{ guid }}"
ocp4_workload_tenant_keycloak_user_password: "{{ common_password }}"
ocp4_workload_tenant_keycloak_user_keycloak_namespace: keycloak
ocp4_workload_tenant_keycloak_user_keycloak_realm: sso

# --- Namespace ---
ocp4_workload_tenant_namespace_username: "user-{{ guid }}"
ocp4_workload_tenant_namespace_use_cluster_quota: true
ocp4_workload_tenant_namespace_suffixes:
  - suffix: deepfield-multimodal
ocp4_workload_tenant_namespace_default_quota:
  limits.cpu: "16"
  requests.cpu: "8"
  limits.memory: "32Gi"
  requests.memory: "16Gi"
  requests.storage: "20Gi"
ocp4_workload_tenant_namespace_default_limit_range:
  default:
    cpu: "2"
    memory: 4Gi
  defaultRequest:
    cpu: 100m
    memory: 256Mi

# --- LiteLLM / MaaS model access ---
ocp4_workload_litellm_virtual_keys_duration: 7d
ocp4_workload_litellm_virtual_keys_models:
  - granite-3-2-8b-instruct-cpu
  - qwen3-235b

# --- AI model requirements (actual usage) ---
ai_model_requirements:
  models:
    - name: granite-3-2-8b-instruct-cpu
      purpose: "Runtime CPU inference for micro/macro classification agents"
      access_method: litemaas
      estimated_input_tokens_per_request: 500
      estimated_output_tokens_per_request: 150
      estimated_requests_per_session: 20
      estimated_session_duration_hours: 2
      max_concurrent_users: 25
      expected_total_users: 100
    - name: qwen3-235b
      purpose: "One-time bootstrap semantic analysis of data sources"
      access_method: litemaas
      estimated_input_tokens_per_request: 2000
      estimated_output_tokens_per_request: 800
      estimated_requests_per_session: 2
      estimated_session_duration_hours: 2
      max_concurrent_users: 5
      expected_total_users: 100

# --- Application deployment ---
quickstart_deploy_via_make_repo_url: https://github.com/rhpds/deepfield-multimodal
quickstart_deploy_via_make_scm_ref: main
quickstart_deploy_via_make_directory: deploy
quickstart_deploy_via_make_params:
  NAMESPACE: "user-{{ guid }}-deepfield-multimodal"
  LITELLM_API_BASE: "https://maas-rhdp.apps.maas.redhatworkshops.io"
  LITELLM_API_KEY: "{{ ocp4_workload_litellm_virtual_keys_key }}"
quickstart_deploy_via_make_uninstall_params:
  NAMESPACE: "user-{{ guid }}-deepfield-multimodal"

# --- Showroom ---
ocp4_workload_showroom_content_url: https://github.com/rhpds/deepfield-multimodal
ocp4_workload_showroom_content_ref: main
ocp4_workload_showroom_content_dir: docs
ocp4_workload_showroom_user: "user-{{ guid }}"
ocp4_workload_showroom_user_password: "{{ common_password }}"
ocp4_workload_showroom_passthrough_user_data: true
ocp4_workload_showroom_user_data:
  user: "user-{{ guid }}"
  password: "{{ common_password }}"
  openshift_api_url: "{{ sandbox_openshift_api_url }}"
  openshift_console_url: "{{ sandbox_openshift_console_url }}"
  openshift_cluster_ingress_domain: "{{ sandbox_openshift_ingress_domain }}"
  deepfield_url: "https://deepfield-multimodal-user-{{ guid }}-deepfield-multimodal.{{ sandbox_openshift_ingress_domain }}"

# --- Platform ---
requester_email: "rhdp-{{ guid }}@demo.redhat.com"
catalog_item_name: ai-quickstarts.ai-qs-deepfield-multimodal-tenant.event
openshift_api_url: "{{ sandbox_openshift_api_url }}"
openshift_cluster_admin_token: "{{ cluster_admin_agnosticd_sa_token }}"

# --- Metadata ---
__meta__:
  access_control:
    allow_groups:
      - rhpds-devs-quickstart-ai
      - email-domain.intel.com
  asset_uuid: 070b5c12-e631-4da9-8bc5-766a857f5213
  owners:
    maintainer:
      - name: Jeff Kershaw
        email: jkershaw@redhat.com
  sandbox_api:
    actions:
      destroy:
        catch_all: false
  catalog:
    display_name: "DeepField Multimodal — Agentic Signal Classification Engine on Intel Xeon 6"
    category: Labs
    namespace: "babylon-catalog-{{ stage | default('?') }}"
    keywords:
      - openshift
      - intel
      - ai
      - classification
      - agents
      - cpu-inference
      - xeon
    labels:
      Provider: RHDP
      Partner: Intel
    reportingLabels:
      primaryBU: Hybrid_Platforms
    parameters: []
  deployer:
    scm_url: https://github.com/agnosticd/agnosticd-v2
    scm_ref: main
    execution_environment:
      image: "quay.io/agnosticd/ee-multicloud:chained-2026-02-23"
      pull: missing
    actions:
      destroy:
        disable: false
      start:
        disable: false
      status:
        disable: true
      stop:
        disable: false
      update:
        disable: true
